# Workflow pour mise à jour automatique des métriques
# Déclenché quotidiennement à 2h UTC et manuellement via workflow_dispatch

name: Update Metrics

on:
  schedule:
    # Tous les jours à 2h UTC (3h CET, 4h CEST)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_update:
        description: "Forcer la mise à jour même si aucune modification"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: ~/.cache/pip
  PYTHONUNBUFFERED: 1

permissions:
  contents: write
  pull-requests: write

jobs:
  update-metrics:
    name: "Mise à jour automatique des métriques"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Vérifier projects.json"
        run: |
          if [ ! -f "projects.json" ]; then
            echo "❌ projects.json non trouvé"
            exit 1
          fi
          echo "✅ projects.json trouvé"
          cat projects.json | head -20

      - name: "Agréger les métriques"
        run: |
          echo "📊 Agrégation des métriques..."
          arkalia-metrics aggregate projects.json \
            --readme-table \
            --json \
            --output metrics \
            --verbose

      - name: "Générer les badges"
        run: |
          echo "🏷️ Génération des badges..."
          if [ -f "metrics/metrics_for_badges.json" ]; then
            arkalia-metrics badges metrics/metrics_for_badges.json \
              --github-owner arkalia-luna-system \
              --github-repo arkalia-metrics-collector \
              --pypi-name arkalia-metrics-collector \
              --output metrics/badges_final.md \
              --verbose
          else
            echo "⚠️ metrics_for_badges.json non trouvé, création..."
            python scripts/create_badges_metrics.py
            arkalia-metrics badges metrics/metrics_for_badges.json \
              --github-owner arkalia-luna-system \
              --github-repo arkalia-metrics-collector \
              --pypi-name arkalia-metrics-collector \
              --output metrics/badges_final.md \
              --verbose
          fi

      - name: "Mettre à jour README.md"
        run: |
          echo "📝 Mise à jour du README..."
          python scripts/update_readme_metrics.py

      - name: "Vérifier les alertes"
        id: check-alerts
        continue-on-error: true
        run: |
          echo "🚨 Vérification des alertes..."
          if [ -f "metrics/aggregated_metrics.json" ]; then
            alerts_output=$(arkalia-metrics alerts \
              metrics/aggregated_metrics.json --threshold 10.0 2>&1) || true
            exit_code=$?
            if [ -z "$(echo "$alerts_output" | grep 'Aucune alerte')" ]; then
              echo "has-alerts=true" >> $GITHUB_OUTPUT
              echo "🚨 Alertes détectées"
            else
              echo "has-alerts=false" >> $GITHUB_OUTPUT
              echo "✅ Aucune alerte"
            fi
          else
            echo "has-alerts=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Métriques non disponibles pour vérification"
          fi

      - name: "Créer issue GitHub si alertes"
        if: steps.check-alerts.outputs.has-alerts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📝 Création d'une issue GitHub pour les alertes..."
          arkalia-metrics alerts metrics/aggregated_metrics.json \
            --threshold 10.0 \
            --create-issue \
            --github-owner arkalia-luna-system \
            --github-repo arkalia-metrics-collector \
            --verbose || echo "Issue peut-être déjà créée"

      - name: "Vérifier les changements"
        id: check-changes
        run: |
          git diff --exit-code README.md metrics/ || \
            echo "has-changes=true" >> $GITHUB_OUTPUT
          if [ -z "$(git diff --exit-code README.md metrics/ || \
            echo 'changed')" ]; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Aucun changement détecté"
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changements détectés"
            git diff --stat README.md metrics/
          fi

      - name: "Commit et Push"
        if: >
          steps.check-changes.outputs.has-changes == 'true' ||
          inputs.force_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md \
            metrics/aggregated_metrics.json \
            metrics/README_TABLE.md \
            metrics/badges_final.md

          git commit -m "📊 Auto-update metrics [skip ci]" \
            -m "Mise à jour automatique des métriques:" \
            -m "- Métriques agrégées depuis 12 projets" \
            -m "- Tableau README mis à jour" \
            -m "- Badges régénérés" \
            || echo "Aucun changement à commiter"

          # Déterminer la branche cible
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" = "develop" ] || [ "$CURRENT_BRANCH" = "main" ]; then
            git push origin "$CURRENT_BRANCH" || \
              echo "Push échoué (peut-être déjà à jour)"
          else
            # Par défaut, push sur develop si on n'est pas sur main ou develop
            git push origin develop || \
              echo "Push échoué (peut-être déjà à jour)"
          fi

      - name: "Résumé"
        if: always()
        run: |
          echo "## 📊 Résumé de la mise à jour" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "metrics/aggregated_metrics.json" ]; then
            echo "✅ Métriques agrégées générées" >> $GITHUB_STEP_SUMMARY
            python3 << 'PYEOF'
          import json
          try:
              with open('metrics/aggregated_metrics.json') as f:
                  data = json.load(f)
              agg = data.get('aggregated', {})
              print(f"- **Modules Python**: {agg.get('total_modules', 0):,}")
              lines = agg.get('total_lines_of_code', 0)
              print(f"- **Lignes de code**: {lines:,}")
              print(f"- **Tests**: {agg.get('total_tests', 0):,}")
              print(f"- **Projets analysés**: {agg.get('total_projects', 0)}")
          except Exception as e:
              print(f"❌ Erreur: {e}")
          PYEOF
          else
            echo "❌ Métriques non générées" >> $GITHUB_STEP_SUMMARY
          fi
