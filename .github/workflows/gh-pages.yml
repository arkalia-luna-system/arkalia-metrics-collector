# Workflow GitHub Pages pour Arkalia Metrics Collector
# Déploie automatiquement la documentation sur GitHub Pages

name: Deploy Documentation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ========================================
  # BUILD DE LA DOCUMENTATION
  # ========================================
  build:
    name: "Build Documentation"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
          pip install -e ".[dev]"

      - name: "Build Documentation"
        run: |
          echo "BUILD DE LA DOCUMENTATION ARKALIA METRICS COLLECTOR"
          echo "=================================================="

          # Vérifier la configuration MkDocs
          mkdocs --version

          # Construire la documentation
          mkdocs build

          echo "✅ Documentation construite avec succès"
          ls -la ./site/

      - name: "Générer Dashboard Interactif"
        run: |
          echo "📊 GÉNÉRATION DU DASHBOARD INTERACTIF"
          echo "====================================="

          # Vérifier si les métriques agrégées existent
          if [ -f "metrics/aggregated_metrics.json" ]; then
            echo "✅ Métriques agrégées trouvées"
            python scripts/generate_dashboard.py
          else
            echo "⚠️  Métriques agrégées non trouvées, génération d'un dashboard vide"
            mkdir -p site/dashboard
            cat > site/dashboard/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="UTF-8">
              <title>Dashboard - Métriques non disponibles</title>
          </head>
          <body>
              <h1>📊 Dashboard Arkalia Metrics</h1>
              <p>Les métriques agrégées ne sont pas encore disponibles.</p>
              <p>Exécutez <code>arkalia-metrics aggregate projects.json</code> pour générer les métriques.</p>
          </body>
          </html>
          EOF
          fi

          echo "✅ Dashboard généré"
          ls -la ./site/dashboard/ || echo "Dossier dashboard créé"

      - name: "Upload Build Artifacts"
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  # ========================================
  # DÉPLOIEMENT GITHUB PAGES
  # ========================================
  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4

      - name: "Deployment Status"
        env:
          DEPLOYMENT_OUTCOME: ${{ steps.deployment.outputs.outcome }}
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          echo "🚀 DÉPLOIEMENT GITHUB PAGES TERMINÉ"
          echo "===================================="
          echo "Status: $DEPLOYMENT_OUTCOME"
          echo "URL: $DEPLOYMENT_URL"

          if [ "$DEPLOYMENT_OUTCOME" = "success" ]; then
            echo "✅ Documentation déployée avec succès !"
            echo "🌐 GitHub Pages sera disponible dans quelques minutes"
            echo "🔗 URL: $DEPLOYMENT_URL"
          else
            echo "❌ Échec du déploiement"
            echo "💡 Vérifiez que GitHub Pages est activé dans les paramètres du repository"
            echo "📋 Vérifiez les permissions du workflow"
            echo "🔧 Vérifiez la configuration MkDocs"
          fi
